<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Las Perras de Nafiri</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="compare.css" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚔</text></svg>">
</head>
<body>
  <div class="bg-overlay"></div>

  <div class="tracker-wrap">
    <header class="header">
      <div class="header-icon">⚔</div>
      <h1>Las Perras de Nafiri</h1>
      <p>League of Legends · Latin America North</p>
    </header>

    <section class="search-section">
      <div class="search-bar">
        <input
          type="text"
          id="search-input"
          placeholder="Nombre#TAG"
          autocomplete="off"
        />
        <button id="search-btn">Buscar</button>
        <button id="records-btn" onclick="openLeaderboard()" title="Ver récords de la perrera">🏆 Récords</button>
        <!-- <button id="tournament-btn" onclick="openTournamentModal()" title="Gestión de Torneos">🏆 Torneo</button> -->
      </div>
      <div id="error-msg" class="error-msg" style="display:none;"></div>
      
      <div class="filter-controls">
        <input type="text" id="filter-input" placeholder="Filtrar por nombre..." autocomplete="off">
      </div>
    </section>

    <section class="accounts-section">
      <div class="section-title">Cuentas rastreadas</div>
      <div class="accounts-grid" id="accounts-grid">
        <div class="empty-state">
          <span class="empty-icon">🗡</span>
          <p>Sin cuentas aún</p>
          <small>Escribe Nombre#TAG y presiona Buscar</small>
        </div>
      </div>
    </section>
  </div>
  <script src="chart.min.js"></script>
  <script src="render.js"></script>
<script src="storage.js"></script>
<script src="api.js"></script>
<script src="app.js"></script>
<script src="compare.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/service-worker.js')
        .then(reg => console.log('SW registrado'))
        .catch(err => console.log('SW error', err));
    });
  }
</script>
</body>
</html>
