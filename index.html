<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LAN Tracker — League of Legends</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="/favicon.ico">
</head>
<body>
  <div class="bg-overlay"></div>

  <div class="tracker-wrap">
    <header class="header">
      <div class="header-icon">⚔</div>
      <h1>LAN Tracker</h1>
      <p>League of Legends · Latin America North</p>
    </header>

    <section class="search-section">
      <div class="search-bar">
        <input
          type="text"
          id="search-input"
          placeholder="Nombre#TAG  (ej: Pepitoflow#LAN1)"
          autocomplete="off"
        />
        <button id="search-btn">Buscar</button>
      </div>
      <div id="error-msg" class="error-msg" style="display:none;"></div>
    </section>

    <section class="accounts-section">
      <div class="section-title">Cuentas rastreadas</div>
      <div class="accounts-grid" id="accounts-grid">
        <div class="empty-state">
          <span class="empty-icon">🗡</span>
          <p>Sin cuentas aún</p>
          <small>Escribe Nombre#TAG y presiona Buscar</small>
        </div>
      </div>
    </section>
  </div>

  <script src="render.js"></script>
<script src="storage.js"></script>
<script src="api.js"></script>
<script src="app.js"></script>
<script src="compare.js"></script>
</body>
</html>
