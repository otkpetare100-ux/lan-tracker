<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LAN Tracker - Las Perras de Naafiri</title>
  <link rel="icon" type="image/png" href="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/champion/Naafiri.png">

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=1.0.8" />
  <link rel="stylesheet" href="compare.css?v=1.0.4" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚔</text></svg>">
</head>
<body>
  <div class="bg-overlay"></div>

  <div class="beta-banner">
    <span>⚠️ <b>ESTADO: BETA</b> - El tracker está en desarrollo y puede contener errores.</span>
  </div>
  
  <aside class="activity-sidebar collapsed" id="activity-sidebar">
    <button class="activity-toggle" id="activity-toggle" title="Alternar Actividad">«</button>
    <button class="activity-pin" id="activity-pin" title="Fijar abierto">📌</button>
    <div class="activity-content-wrapper">
      <div class="section-title">Actividad Reciente</div>
      <div id="activity-feed" class="activity-feed">
        <div class="empty-state-mini">Cargando actividad...</div>
      </div>
    </div>
  </aside>



  <div class="tracker-wrap">
    <header class="header">
      <div class="header-icon">⚔</div>
      <h1>Las Perras de Naafiri</h1>
      <p>League of Legends · Latin America North</p>
    </header>

    <section class="search-section">
      <div class="search-bar">
        <input
          type="text"
          id="search-input"
          placeholder="Nombre#TAG"
          autocomplete="off"
        />
        <button id="search-btn">Buscar</button>
        <button id="records-btn" onclick="openLeaderboard()" title="Ver récords de la perrera">🏆 Récords</button>
        <button id="hof-btn" onclick="window.location.href='hall-of-fame.html'" title="Salón de la Fama">👑 Hall of Fame</button>
        <!-- <button id="tournament-btn" onclick="openTournamentModal()" title="Gestión de Torneos">🏆 Torneo</button> -->
      </div>
      <div id="error-msg" class="error-msg" style="display:none;"></div>
      
      <div class="filter-controls">
        <input type="text" id="filter-input" placeholder="Filtrar por nombre..." autocomplete="off">
      </div>
    </section>

    <section class="accounts-section">
      <div class="section-title">Cuentas rastreadas</div>
      <div class="accounts-grid" id="accounts-grid">
        <div class="empty-state">
          <span class="empty-icon">🗡</span>
          <p>Sin cuentas aún</p>
          <small>Escribe Nombre#TAG y presiona Buscar</small>
        </div>
      </div>
    </section>
  </div>
  <script src="chart.min.js?v=1.0.5"></script>
  <script src="render.js?v=1.0.5"></script>
  <script src="storage.js?v=1.0.5"></script>
  <script src="api.js?v=1.0.5"></script>
  <script src="app.js?v=1.0.5"></script>
  <script src="compare.js?v=1.0.5"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/service-worker.js?v=1.0.5')
        .then(reg => {
          console.log('SW registrado');
          // Si hay una actualización esperando, forzamos el reload
          reg.onupdatefound = () => {
            const installingWorker = reg.installing;
            installingWorker.onstatechange = () => {
              if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                console.log('Nueva versión detectada, recargando...');
                window.location.reload();
              }
            };
          };
        })
        .catch(err => console.log('SW error', err));
    });
  }
</script>
  <!-- MODAL DE DETALLES DE PARTIDA -->
  <div id="matchModal" class="modal-overlay" onclick="closeMatchModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <span class="modal-close" onclick="closeMatchModal(event)">×</span>
      <div id="modalBody">
        <div class="loading-modal">
          <div class="spinner"></div>
          <p>Consultando a Riot Games...</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
