<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LAN Tracker - Las Perras de Naafiri</title>
  <meta name="description" content="Tracker de League of Legends para la comunidad Las Perras de Naafiri." />
  <link rel="icon" type="image/png" href="pic/estetica/logo.png">

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=3.0.1" />
  <link rel="manifest" href="manifest.json" />
</head>
<body>

  <!-- Fondo atmosférico -->
  <div class="bg-overlay"></div>

  <!-- NAVBAR -->
  <nav class="topnav" id="topnav">
    <div class="topnav-inner">
      <div class="topnav-brand">
        <img src="pic/estetica/logo.png" class="topnav-logo" alt="Logo">
        <div class="topnav-title-wrap">
          <img src="pic/estetica/texto.png" class="topnav-title-img" alt="Título">
        </div>
      </div>
      <div class="topnav-actions">
        <button onclick="openLeaderboard()">🏆 Récords</button>
        <button onclick="openBackpackPrompt()">🎒 Mochila</button>
        <button onclick="window.location.href='hall-of-fame.html'">👑 HOF</button>
      </div>
    </div>
  </nav>

  <!-- CONTENIDO -->
  <main class="tracker-wrap">

    <!-- Hero Search -->
    <section class="search-section">
      <div class="search-hero">
        <p class="search-hint">Rastreador de Invocadores</p>
        <div class="search-bar">
          <div class="search-input-wrap">
            <input type="text" id="search-input" placeholder="Nombre#TAG" autocomplete="off" />
          </div>
          <button id="search-btn">Rastrear</button>
        </div>
        <div id="error-msg" class="error-msg" style="display:none;"></div>
      </div>
    </section>

    <!-- Cuentas -->
    <section class="accounts-section">
      <h2 class="section-title">Invocadores en Seguimiento</h2>
      <div class="accounts-grid" id="accounts-grid">
        <!-- Generado por render.js -->
      </div>
    </section>

  </main>

  <!-- Sidebar de Actividad -->
  <aside class="activity-sidebar collapsed" id="activity-sidebar">
    <button class="activity-toggle" id="activity-toggle">«</button>
    <div class="activity-sidebar-header">
      <h3 style="font-family: var(--font-title); color: #fff; margin:0; font-size:1rem;">📡 Feed Actividad</h3>
      <button id="activity-pin" style="background: none; border: none; font-size: 1.1rem; cursor: pointer; opacity: 0.5; transition: opacity 0.2s;" title="Fijar panel">📌</button>
    </div>
    <div id="activity-feed" style="overflow-y: auto; height: calc(100% - 70px);">
      <div class="empty-state-mini">Cargando actividad...</div>
    </div>
  </aside>

  <!-- Scripts -->
  <script src="chart.min.js"></script>
  <script src="render.js?v=3.0.1"></script>
  <script src="storage.js?v=3.0.1"></script>
  <script src="api.js?v=3.0.1"></script>
  <script src="app.js?v=3.0.1"></script>
  <script src="compare.js?v=3.0.1"></script>

  <!-- Modal de Detalles -->
  <div id="matchModal" class="modal-overlay" onclick="closeMatchModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <span class="modal-close" onclick="closeMatchModal(event)">×</span>
      <div id="modalBody"></div>
    </div>
  </div>

  <!-- Diálogo Personalizado (Premium Alert/Confirm/Prompt) -->
  <div id="customDialog" class="modal-overlay" style="z-index: 10000;">
    <div class="modal-content" style="max-width: 400px; text-align: center; padding: 40px 30px;">
      <h3 id="cd-title" style="margin-top: 0; color: var(--gold-primary);"></h3>
      <p id="cd-message" style="margin-bottom: 25px; color: #ccc;"></p>
      <input type="text" id="cd-input" class="search-input" style="display:none; width:100%; margin-bottom: 25px; text-align:center;" autocomplete="off" />
      <div style="display: flex; gap: 15px; justify-content: center;">
        <button id="cd-cancel" style="background:transparent; border:1px solid #d93f3f; color:#d93f3f; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:700; display:none;">Cancelar</button>
        <button id="cd-confirm" style="background:var(--gold-primary); border:none; color:#000; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:800;">Aceptar</button>
      </div>
    </div>
  </div>

  <script>
    // Efecto scroll en navbar
    window.addEventListener('scroll', () => {
      const nav = document.getElementById('topnav');
      if (nav) nav.classList.toggle('scrolled', window.scrollY > 20);
    });

    async function openBackpackPrompt() {
      let discordId = localStorage.getItem('myDiscordId');
      if (!discordId) {
        discordId = await showCustomPrompt('Mochila de Discord', 'Ingresa tu Discord ID numérico para ver tu inventario:');
        if (discordId) localStorage.setItem('myDiscordId', discordId.trim());
      }
      if (discordId) window.location.href = `/perfil/${discordId.trim()}`;
    }
  </script>
</body>
</html>
