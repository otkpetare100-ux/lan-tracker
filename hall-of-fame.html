<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hall of Fame - Las Perras de Naafiri</title>
  <link rel="stylesheet" href="styles.css?v=1.0.4">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400;700;800&display=swap"
    rel="stylesheet">
  <style>
    body {
      background: radial-gradient(circle at top, #101422, #05070f);
      overflow-y: auto;
      padding: 40px 20px;
    }

    .hof-container {
      max-width: 1100px;
      margin: 0 auto;
      animation: fadeIn 0.8s ease;
    }

    .hof-header {
      text-align: center;
      margin-bottom: 50px;
    }

    .hof-header h1 {
      font-family: 'Cinzel', serif;
      font-size: 3rem;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 6px;
      text-shadow: 0 0 20px rgba(217, 184, 95, 0.4);
      margin-bottom: 10px;
    }

    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      font-weight: 700;
      transition: all 0.3s;
      z-index: 100;
    }

    .back-btn:hover {
      background: var(--gold);
      color: #000;
    }
  </style>
</head>

<body>
  <a href="index.html" class="back-btn">← Volver al Tracker</a>

  <div class="hof-container">
    <header class="hof-header">
      <h1>🏆 Salón de la Fama</h1>
      <p style="color: var(--muted); letter-spacing: 2px;">LA HISTORIA DE LOS MEJORES DE LAN</p>
    </header>

    <div id="hof-content">
      <div class="empty-state" style="border: none; background: none;">
        <p>Cargando historia de campeones...</p>
      </div>
    </div>
  </div>

  <script src="render.js?v=1.0.4"></script>
  <script>
    // Sobreescribimos la función para que rinda en este contenedor
    async function loadHofPage() {
      const body = document.getElementById('hof-content');
      try {
        const res = await fetch('/splits');
        const splits = await res.json();

        if (!splits || splits.length === 0) {
          body.innerHTML = '<div class="empty-state-mini" style="text-align:center; font-size: 1.2rem; margin-top: 100px;">Aún no hay splits archivados. ¡Haz historia hoy!</div>';
          return;
        }

        // Usamos la lógica de renderizado que ya tenemos en render.js
        // pero inyectando el HTML en 'hof-content'
        const tempDiv = document.createElement('div');
        tempDiv.id = 'hof-body'; // Reutilizamos el ID que espera la función
        document.body.appendChild(tempDiv);
        tempDiv.style.display = 'none';

        renderHallOfFame(splits);

        body.innerHTML = tempDiv.innerHTML;
        tempDiv.remove();
      } catch (e) {
        body.innerHTML = '<div class="error-msg">Error al conectar con el servidor</div>';
      }
    }

    window.onload = loadHofPage;
  </script>
</body>

</html>
