<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salón de la Fama - LAN Tracker</title>
  <link rel="icon" type="image/png" href="pic/estetica/logo.png">
  <link rel="stylesheet" href="styles.css?v=3.0.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-overlay"></div>
  <a href="/" class="back-btn">← Volver al Tracker</a>

  <div class="profile-container">
    <header class="profile-header">
      <div class="user-avatar">
        <img src="pic/estetica/logo.png" style="width: 100%; height: 100%; object-fit: contain; padding: 10px;" alt="HOF">
      </div>
      <div class="user-info">
        <h1>Salón de la Fama</h1>
        <p style="color: var(--gold-primary); letter-spacing: 2px; text-transform: uppercase; font-size: 0.8rem; font-weight: 800;">
          La historia de los mejores de LAN
          <button id="archive-btn" style="background:none; border:none; cursor:pointer; font-size:1rem; opacity:0.1;">⚙️</button>
          <button id="delete-btn" style="background:none; border:none; cursor:pointer; font-size:1rem; opacity:0.1;">🗑️</button>
        </p>
      </div>
    </header>

    <div id="hof-content">
      <div class="loading">Cargando historia de campeones...</div>
    </div>
  </div>

  <script src="render.js?v=3.0.0"></script>
  <script>
    async function loadHofPage() {
      const body = document.getElementById('hof-content');
      try {
        const res = await fetch('/splits');
        const splits = await res.json();

        if (!splits || splits.length === 0) {
          body.innerHTML = '<div class="stat-label" style="text-align:center; font-size: 1.2rem; margin-top: 50px;">Aún no hay splits archivados. ¡Haz historia hoy!</div>';
          return;
        }

        const tempDiv = document.createElement('div');
        tempDiv.id = 'hof-body';
        document.body.appendChild(tempDiv);
        tempDiv.style.display = 'none';

        renderHallOfFame(splits);

        body.innerHTML = tempDiv.innerHTML;
        tempDiv.remove();
      } catch (e) {
        body.innerHTML = '<div class="error-msg">Error al conectar con el servidor</div>';
      }
    }

    window.onload = loadHofPage;

    document.getElementById('archive-btn').onclick = async () => {
      const name = prompt('Nombre del nuevo Split:');
      if (!name) return;
      const key = prompt('Clave de Administrador:');
      if (!key) return;
      try {
        const res = await fetch('/splits/archive', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, key })
        });
        if (res.ok) { alert('✅ ¡Split archivado!'); location.reload(); }
        else { alert('❌ Error al archivar'); }
      } catch (e) { alert('❌ Error de conexión'); }
    };

    document.getElementById('delete-btn').onclick = async () => {
      const key = prompt('Clave de Administrador para BORRAR:');
      if (!key) return;
      if (!confirm('⚠️ ¿BORRAR split?')) return;
      try {
        const res = await fetch('/splits/last', {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key })
        });
        if (res.ok) { alert('🗑️ Split borrado'); location.reload(); }
      } catch (e) { alert('❌ Error'); }
    };
  </script>
</body>
</html>
