<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Usuario | LAN Tracker</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --premium-gold: #c89b3c;
            --premium-gold-dark: #785a28;
            --dark-bg: #010a13;
            --card-bg: #0a0e13;
            --border-color: #1e2328;
        }

        body {
            background-color: var(--dark-bg);
            color: #f0e6d2;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .profile-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
        }

        .profile-header {
            background: linear-gradient(135deg, #050a12 0%, #0a0e13 100%);
            border: 1px solid var(--premium-gold-dark);
            border-radius: 12px;
            padding: 40px;
            display: flex;
            align-items: center;
            gap: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .profile-header::after {
            content: '';
            position: absolute;
            right: -100px;
            top: -100px;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(200,155,60,0.1) 0%, transparent 70%);
            z-index: 0;
        }

        .user-avatar {
            width: 130px;
            height: 130px;
            border-radius: 12px;
            border: 2px solid var(--premium-gold);
            box-shadow: 0 0 30px rgba(200, 155, 60, 0.2);
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            font-weight: 800;
            color: var(--premium-gold);
            z-index: 1;
            position: relative;
            overflow: hidden;
        }

        .user-info {
            z-index: 1;
        }

        .user-info h1 {
            margin: 0;
            font-size: 2.8rem;
            letter-spacing: 1px;
            font-weight: 800;
            background: linear-gradient(to bottom, #ffffff 0%, #c8aa6e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .user-stats {
            display: flex;
            gap: 30px;
            margin-top: 20px;
        }

        .stat-item {
            background: rgba(255,255,255,0.03);
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
            min-width: 120px;
        }

        .stat-value {
            display: block;
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--premium-gold);
        }

        .stat-label {
            font-size: 0.7rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .inventory-section {
            background-color: rgba(10, 14, 19, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            backdrop-filter: blur(5px);
        }

        .section-title {
            font-size: 1.8rem;
            font-weight: 700;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 20px;
            margin-bottom: 35px;
            display: flex;
            align-items: center;
            gap: 15px;
            letter-spacing: 1px;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        .item-card {
            background: #0d1117;
            border: 1px solid #21262d;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            max-width: 200px;
        }

        .item-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 12px;
            padding: 2px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .item-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(200, 155, 60, 0.4);
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        .item-img-container {
            width: 100%;
            aspect-ratio: 0.7;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 15px;
            background-color: #000;
            position: relative;
        }

        .item-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .item-card:hover .item-img {
            transform: scale(1.1);
        }

        .item-name {
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 6px;
            display: block;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-rarity {
            font-size: 0.6rem;
            padding: 3px 10px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1px;
            display: inline-block;
        }

        /* Efectos por Rareza */
        .card-Legendario { border-color: rgba(241, 196, 15, 0.3); box-shadow: 0 0 20px rgba(241, 196, 15, 0.1); }
        .card-Legendario:hover { border-color: #f1c40f; box-shadow: 0 0 30px rgba(241, 196, 15, 0.3); }
        .rarity-Legendario { background: #f1c40f; color: #000; box-shadow: 0 0 10px rgba(241, 196, 15, 0.5); }

        .card-Épico { border-color: rgba(155, 89, 182, 0.3); }
        .card-Épico:hover { border-color: #9b59b6; box-shadow: 0 0 25px rgba(155, 89, 182, 0.2); }
        .rarity-Épico { background: #9b59b6; color: #fff; }

        .card-Raro { border-color: rgba(52, 152, 219, 0.3); }
        .card-Raro:hover { border-color: #3498db; }
        .rarity-Raro { background: #3498db; color: #fff; }

        .rarity-Común { background: rgba(255,255,255,0.1); color: #ccc; }

        .loading {
            text-align: center;
            padding: 100px;
            font-size: 1.5rem;
            color: var(--premium-gold);
        }

        .error-msg {
            text-align: center;
            padding: 100px;
            color: #d93f3f;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(10, 14, 19, 0.8);
            border: 1px solid var(--premium-gold-dark);
            color: var(--premium-gold);
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .back-btn:hover {
            background: var(--premium-gold);
            color: #000;
        }
    </style>
</head>
<body>
    <a href="/" class="back-btn">← Volver al Tracker</a>

    <div class="profile-container" id="profile-content">
        <div class="loading">Invocando el perfil...</div>
    </div>

    <script>
        async function loadProfile() {
            const pathParts = window.location.pathname.split('/');
            const discordId = pathParts[pathParts.length - 1];
            const content = document.getElementById('profile-content');

            try {
                // Cargar items dinámicamente
                const itemsRes = await fetch('/api/items');
                const GACHA_ITEMS = await itemsRes.json();

                const response = await fetch(`/api/profile/${discordId}`);
                if (!response.ok) throw new Error('Perfil no encontrado');
                const data = await response.json();

                // Obtener versión de DDragon
                const vRes = await fetch('https://ddragon.leagueoflegends.com/api/versions.json');
                const versions = await vRes.json();
                const version = versions[0];

                const inventory = data.inventory || [];
                const inventoryHtml = inventory.length > 0 
                    ? inventory.map(itemObj => {
                        // Buscar info extendida en GACHA_ITEMS (usando el ID guardado en el objeto del inventario)
                        const item = GACHA_ITEMS.find(i => i.id === itemObj.id) || itemObj;
                        
                        let imgUrl = 'https://ddragon.leagueoflegends.com/cdn/' + version + '/img/profileicon/29.png';
                        
                        if (item.type === 'coins') {
                            imgUrl = 'https://cdn-icons-png.flaticon.com/512/2489/2489756.png';
                        } else if (item.img) {
                            // Si tiene img (ej: Naafiri_1), usamos splash/loading
                            imgUrl = `https://ddragon.leagueoflegends.com/cdn/img/champion/loading/${item.img}.jpg`;
                        } else {
                            // Fallback al icono cuadrado por ID
                            imgUrl = `https://ddragon.leagueoflegends.com/cdn/${version}/img/champion/${item.id}.png`;
                        }
                        
                        return `
                            <div class="item-card card-${item.rarity}">
                                <div class="item-img-container">
                                    <img src="${imgUrl}" alt="${item.name}" class="item-img" onerror="this.src='https://ddragon.leagueoflegends.com/cdn/${version}/img/profileicon/29.png'">
                                </div>
                                <span class="item-name">${item.name}</span>
                                <span class="item-rarity rarity-${item.rarity}">${item.rarity}</span>
                            </div>
                        `;
                    }).join('')
                    : '<p style="grid-column: 1/-1; text-align: center; padding: 40px; color: #a09b8c;">La mochila está vacía... por ahora.</p>';

                const displayName = data.linkedAcc 
                    ? `${data.linkedAcc.gameName}#${data.linkedAcc.tagLine}`
                    : (data.discordTag || 'Usuario Desconocido');

                const displayAvatar = data.linkedAcc
                    ? `https://ddragon.leagueoflegends.com/cdn/${version}/img/profileicon/${data.linkedAcc.profileIconId}.png`
                    : null;

                content.innerHTML = `
                    <div class="profile-header">
                        <div class="user-avatar">
                            ${displayAvatar ? `<img src="${displayAvatar}" style="width:100%; height:100%; border-radius:50%;">` : (data.discordTag ? data.discordTag.charAt(0) : '?')}
                        </div>
                        <div class="user-info">
                            <h1>${displayName}</h1>
                            <div class="user-stats">
                                <div class="stat-item">
                                    <span class="stat-value">${data.coins.toLocaleString()}</span>
                                    <span class="stat-label">Naafiri Coins</span>
                                </div>
                                <div class="stat-item">
                                    <span class="stat-value">${inventory.length}</span>
                                    <span class="stat-label">Campeones</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="inventory-section">
                        <div class="section-title">
                            <i>🎒</i> Mi Mochila de Campeones
                        </div>
                        <div class="items-grid">
                            ${inventoryHtml}
                        </div>
                    </div>
                `;
            } catch (err) {
                content.innerHTML = `
                    <div class="error-msg">
                        <h1>⚠️ Perfil no encontrado</h1>
                        <p>No pudimos encontrar datos para este usuario. Asegúrate de estar vinculado en el servidor de Discord.</p>
                        <a href="/" style="color: var(--premium-gold); text-decoration: none;">Volver al inicio</a>
                    </div>
                `;
            }
        }

        loadProfile();
    </script>
</body>
</html>
